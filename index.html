<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGNAL_PROCESSOR // THE SENTINEL NETWORK</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            onyx: '#050608',
            panel: '#0A0D10',
            teal: '#4DE3E0',
            tealMuted: '#1B4A4C',
            sentinelOrange: '#FF6A1A',
            fog: '#E4E8EC',
            sentinelRed: '#FF3B3B'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap');
    * { font-family: 'JetBrains Mono', monospace; }
    h1, h2 { font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.01em; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #050608; border-left: 1px solid #1B4A4C; }
    ::-webkit-scrollbar-thumb { background: #1B4A4C; }
    ::-webkit-scrollbar-thumb:hover { background: #4DE3E0; }
    input[type="color"] { -webkit-appearance: none; border: none; padding: 0; background: none; cursor: pointer; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid #1B4A4C; border-radius: 0; }
    input[type="range"] { accent-color: #4DE3E0; }
  </style>
</head>
<body class="bg-onyx">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- Icon components (replaces lucide-react) ---
    const Icon = ({ d, size=16, className='' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d.map((path, i) => <path key={i} d={path} />)}
      </svg>
    );
    const Play = (p) => <Icon {...p} d={['M5 3l14 9-14 9V3z']} />;
    const Square = (p) => <Icon {...p} d={['M3 3h18v18H3V3z', 'M3 9h18', 'M9 3v18']} />;
    const Download = (p) => <Icon {...p} d={['M12 3v12', 'M7 11l5 5 5-5', 'M5 21h14']} />;
    const Upload = (p) => <Icon {...p} d={['M12 3v12', 'M7 8l5-5 5 5', 'M5 21h14']} />;
    const Activity = (p) => <Icon {...p} d={['M22 12h-4l-3 9L9 3l-3 9H2']} />;
    const Crosshair = (p) => <Icon {...p} d={['M12 2v4', 'M12 18v4', 'M2 12h4', 'M18 12h4', 'M12 8a4 4 0 100 8 4 4 0 000-8z']} />;
    const Palette = (p) => <Icon {...p} d={['M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z', 'M12 8a2 2 0 100 4 2 2 0 000-4z', 'M16 10a2 2 0 100 4 2 2 0 000-4z', 'M8 14a2 2 0 100 4 2 2 0 000-4z', 'M12 16a2 2 0 100 4 2 2 0 000-4z']} />;
    const Sliders = (p) => <Icon {...p} d={['M4 21v-7', 'M4 10V3', 'M12 21v-9', 'M12 8V3', 'M20 21v-5', 'M20 16V3', 'M1 14h6', 'M9 8h6', 'M17 16h6']} />;

    const COLORS = {
      onyx: '#050608',
      panel: '#0A0D10',
      tealPrimary: '#4DE3E0',
      tealMuted: '#1B4A4C',
      orange: '#FF6A1A',
      fog: '#E4E8EC',
      red: '#FF3B3B'
    };

    const SWATCHES = [
      { label: 'TEAL', value: COLORS.tealPrimary },
      { label: 'ORANGE', value: COLORS.orange },
      { label: 'RED', value: COLORS.red },
      { label: 'FOG', value: COLORS.fog }
    ];

    const CornerBrackets = () => (
      React.createElement(React.Fragment, null,
        React.createElement('div', { className: "absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-[#4DE3E0] pointer-events-none" }),
        React.createElement('div', { className: "absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#4DE3E0] pointer-events-none" }),
        React.createElement('div', { className: "absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#4DE3E0] pointer-events-none" }),
        React.createElement('div', { className: "absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-[#4DE3E0] pointer-events-none" })
      )
    );

    const BrutalistButton = ({ children, onClick, disabled, variant = 'teal', className = '', active = false }) => {
      const baseClasses = "relative px-4 py-2 font-mono text-sm uppercase tracking-wider border transition-colors duration-150 active:translate-y-[1px] active:translate-x-[1px] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2";
      const variants = {
        teal: "text-[#4DE3E0] border-[#4DE3E0] hover:bg-[#4DE3E0] hover:text-[#050608]",
        orange: "text-[#FF6A1A] border-[#FF6A1A] hover:bg-[#FF6A1A] hover:text-[#050608]",
        ghost: "text-[#E4E8EC] border-[#1B4A4C] hover:border-[#4DE3E0]",
        activeTeal: "bg-[#4DE3E0] text-[#050608] border-[#4DE3E0]"
      };
      const currentVariant = active ? 'activeTeal' : variant;
      return React.createElement('button', { onClick, disabled, className: `${baseClasses} ${variants[currentVariant]} ${className}` }, children);
    };

    function App() {
      const [audioFile, setAudioFile] = useState(null);
      const [mediaFile, setMediaFile] = useState(null);
      const [mediaType, setMediaType] = useState(null);
      const [visualStyle, setVisualStyle] = useState('spectrum');
      const [primaryColor, setPrimaryColor] = useState(COLORS.tealPrimary);
      const [secondaryColor, setSecondaryColor] = useState(COLORS.orange);
      const [verticalPosition, setVerticalPosition] = useState(100);
      const [amplitudeScale, setAmplitudeScale] = useState(1.0);
      const [traceOpacity, setTraceOpacity] = useState(1.0);
      const [isProcessing, setIsProcessing] = useState(false);
      const [progress, setProgress] = useState(0);
      const [outputVideo, setOutputVideo] = useState(null);
      const [statusText, setStatusText] = useState('STANDBY');

      const canvasRef = useRef(null);
      const audioRef = useRef(null);
      const videoRef = useRef(null);
      const imageElementRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const recordedChunksRef = useRef([]);
      const animationFrameRef = useRef(null);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);
      const peaksRef = useRef(new Array(1024).fill(0));
      const audioSourceRef = useRef(null);
      const videoSourceRef = useRef(null);
      const configRef = useRef({ visualStyle, primaryColor, secondaryColor, verticalPosition, amplitudeScale, traceOpacity });

      useEffect(() => {
        return () => { if (mediaFile) URL.revokeObjectURL(mediaFile); };
      }, [mediaFile]);

      useEffect(() => {
        return () => { if (audioFile) URL.revokeObjectURL(audioFile); };
      }, [audioFile]);

      const drawGrid = (ctx, width, height) => {
        ctx.strokeStyle = 'rgba(77, 227, 224, 0.18)';
        ctx.lineWidth = 1;
        const step = 40;
        ctx.beginPath();
        for (let x = 0; x <= width; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
        for (let y = 0; y <= height; y += step) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
        ctx.stroke();
      };

      const drawMediaCover = (ctx, cw, ch, ew, eh, fn) => {
        const scale = Math.max(cw / ew, ch / eh);
        const w = ew * scale, h = eh * scale;
        fn((cw - w) / 2, (ch - h) / 2, w, h);
      };

      const drawStaticPreview = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = COLORS.onyx;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (mediaType === 'image' && imageElementRef.current) {
          const img = imageElementRef.current;
          drawMediaCover(ctx, canvas.width, canvas.height, img.width, img.height, (x, y, w, h) => ctx.drawImage(img, x, y, w, h));
        } else if (mediaType === 'video' && videoRef.current && videoRef.current.readyState >= 2) {
          const vid = videoRef.current;
          drawMediaCover(ctx, canvas.width, canvas.height, vid.videoWidth, vid.videoHeight, (x, y, w, h) => ctx.drawImage(vid, x, y, w, h));
        }

        ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
        ctx.shadowBlur = 3;
        drawGrid(ctx, canvas.width, canvas.height);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;

        if (!isProcessing) {
          const { verticalPosition: vp, primaryColor: pc, traceOpacity: to } = configRef.current;
          const baselineY = canvas.height * (vp / 100);
          ctx.globalAlpha = to;
          ctx.beginPath();
          ctx.moveTo(0, baselineY);
          ctx.lineTo(canvas.width, baselineY);
          ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.stroke();
          ctx.shadowBlur = 8; ctx.shadowColor = pc;
          ctx.strokeStyle = pc; ctx.lineWidth = 2; ctx.stroke();
          ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;
        }
      }, [isProcessing, mediaType]);

      useEffect(() => {
        configRef.current = { visualStyle, primaryColor, secondaryColor, verticalPosition, amplitudeScale, traceOpacity };
        if (!isProcessing) drawStaticPreview();
      }, [visualStyle, primaryColor, secondaryColor, verticalPosition, amplitudeScale, traceOpacity, isProcessing, drawStaticPreview]);

      useEffect(() => {
        if (mediaType === 'video' && videoRef.current) videoRef.current.onloadeddata = drawStaticPreview;
      }, [mediaType, mediaFile, drawStaticPreview]);

      const handleMediaUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          setMediaFile(url);
          if (file.type.startsWith('video/')) { setMediaType('video'); setStatusText('VIDEO_TARGET_ACQUIRED'); }
          else { setMediaType('image'); setStatusText('IMAGE_TARGET_ACQUIRED');
            const img = new Image();
            img.onload = () => { imageElementRef.current = img; drawStaticPreview(); };
            img.src = url;
          }
          setOutputVideo(null);
        }
      };

      const handleAudioUpload = (e) => {
        const file = e.target.files[0];
        if (file) { setAudioFile(URL.createObjectURL(file)); setStatusText('AUDIO_TARGET_ACQUIRED'); setOutputVideo(null); }
      };

      const renderFrame = () => {
        if (!analyserRef.current || !canvasRef.current) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const analyser = analyserRef.current;
        const bufferLength = analyser.frequencyBinCount;
        const { visualStyle: vs, primaryColor: pc, secondaryColor: sc, verticalPosition: vp, amplitudeScale: as, traceOpacity: to } = configRef.current;
        drawStaticPreview();
        ctx.globalAlpha = to;

        if (vs === 'spectrum') {
          const dataArray = new Uint8Array(bufferLength);
          analyser.getByteFrequencyData(dataArray);
          const barWidth = canvas.width / bufferLength;
          const segmentHeight = 6, gap = 2;
          let x = 0;
          ctx.shadowColor = 'rgba(0, 0, 0, 0.9)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
          for (let i = 0; i < bufferLength; i++) {
            const value = dataArray[i];
            if (value > peaksRef.current[i]) peaksRef.current[i] = value;
            else peaksRef.current[i] = Math.max(0, peaksRef.current[i] - 2.5);
            const maxDrawHeight = canvas.height * (0.8 * as);
            const yOffset = canvas.height * (vp / 100);
            const numSegments = Math.floor((value / 255) * (maxDrawHeight / (segmentHeight + gap)));
            for (let j = 0; j < numSegments; j++) {
              const y = yOffset - (j * (segmentHeight + gap)) - segmentHeight;
              ctx.fillStyle = (value > 200 && j >= numSegments - 2) ? sc : pc;
              ctx.fillRect(x, y, barWidth - 2, segmentHeight);
            }
            if (peaksRef.current[i] > 5) {
              const peakNumSegments = Math.floor((peaksRef.current[i] / 255) * (maxDrawHeight / (segmentHeight + gap)));
              const peakY = yOffset - (peakNumSegments * (segmentHeight + gap)) - segmentHeight - 4;
              ctx.fillStyle = sc;
              ctx.fillRect(x, peakY, barWidth - 2, 2);
            }
            x += barWidth;
          }
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        } else if (vs === 'oscilloscope') {
          const dataArray = new Uint8Array(bufferLength);
          analyser.getByteTimeDomainData(dataArray);
          const baselineY = canvas.height * (vp / 100);
          ctx.shadowBlur = 2; ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.strokeStyle = 'rgba(77, 227, 224, 0.4)'; ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, baselineY - (canvas.height * 0.15 * as)); ctx.lineTo(canvas.width, baselineY - (canvas.height * 0.15 * as));
          ctx.moveTo(0, baselineY + (canvas.height * 0.15 * as)); ctx.lineTo(canvas.width, baselineY + (canvas.height * 0.15 * as));
          ctx.stroke();
          ctx.beginPath();
          const sliceWidth = canvas.width / bufferLength;
          let x = 0;
          for (let i = 0; i < bufferLength; i++) {
            const v = ((dataArray[i] / 128.0) - 1.0) * as;
            const y = baselineY + (v * (canvas.height / 3));
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += sliceWidth;
          }
          ctx.lineTo(canvas.width, baselineY);
          ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
          ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)'; ctx.stroke();
          ctx.shadowBlur = 8; ctx.shadowColor = pc;
          ctx.lineWidth = 2; ctx.strokeStyle = pc; ctx.stroke();
          ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1.0;
        const primaryMedia = audioFile ? audioRef.current : videoRef.current;
        if (primaryMedia && !primaryMedia.paused) {
          const current = primaryMedia.currentTime, total = primaryMedia.duration;
          if (total) setProgress(Math.floor((current / total) * 100));
        }
        animationFrameRef.current = requestAnimationFrame(renderFrame);
      };

      const startProcessing = async () => {
        if (!mediaFile) { alert("Missing base plate. A Video or Image is required."); return; }
        try {
          setIsProcessing(true); setProgress(0); setStatusText('INITIATING_CAPTURE_SEQUENCE');
          recordedChunksRef.current = [];
          if (!audioContextRef.current) audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
          const audioCtx = audioContextRef.current;
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          if (!analyserRef.current) analyserRef.current = audioCtx.createAnalyser();
          analyserRef.current.fftSize = visualStyle === 'spectrum' ? 256 : 1024;
          const destination = audioCtx.createMediaStreamDestination();
          const useDedicatedAudio = !!audioFile;
          const activeMediaEl = useDedicatedAudio ? audioRef.current : videoRef.current;
          if (activeMediaEl && !activeMediaEl.src.startsWith('blob:')) activeMediaEl.crossOrigin = "anonymous";
          if (videoRef.current && !videoRef.current.src.startsWith('blob:')) videoRef.current.crossOrigin = "anonymous";
          const activeSource = useDedicatedAudio ? audioSourceRef.current : videoSourceRef.current;
          if (activeSource) { activeSource.connect(analyserRef.current); analyserRef.current.connect(destination); analyserRef.current.connect(audioCtx.destination); }
          if (mediaType === 'video' && videoRef.current) { videoRef.current.muted = useDedicatedAudio; videoRef.current.loop = useDedicatedAudio; }
          const canvas = canvasRef.current;
          const canvasStream = canvas.captureStream(30);
          const tracks = [...canvasStream.getVideoTracks()];
          if (activeSource) tracks.push(...destination.stream.getAudioTracks());
          const combinedStream = new MediaStream(tracks);
          let options = { mimeType: 'video/webm;codecs=vp9' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm;codecs=vp8' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/mp4' };
          mediaRecorderRef.current = new MediaRecorder(combinedStream, options);
          mediaRecorderRef.current.ondataavailable = (e) => { if (e.data.size > 0) recordedChunksRef.current.push(e.data); };
          mediaRecorderRef.current.onstop = () => {
            const mimeType = mediaRecorderRef.current.mimeType || 'video/webm';
            const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
            const blob = new Blob(recordedChunksRef.current, { type: mimeType });
            setOutputVideo({ url: URL.createObjectURL(blob), filename: `SENTINEL_OUTPUT.${ext}` });
            setIsProcessing(false); setStatusText('RENDER_COMPLETE // EXPORT_READY');
            cancelAnimationFrame(animationFrameRef.current);
          };
          mediaRecorderRef.current.start();
          if (mediaType === 'video' && videoRef.current) { videoRef.current.currentTime = 0; videoRef.current.play(); }
          if (useDedicatedAudio && audioRef.current) { audioRef.current.currentTime = 0; audioRef.current.play(); }
          setStatusText('RECORDING_ACTIVE');
          renderFrame();
        } catch (error) {
          console.error("[SENTINEL_ERROR]", error);
          setIsProcessing(false); setStatusText('ERROR // INITIALIZATION_FAILED');
          alert(`Render Initialization Failed: ${error.message}`);
        }
      };

      const stopProcessing = () => {
        if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
        if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
        if (videoRef.current) { videoRef.current.pause(); videoRef.current.currentTime = 0; }
      };

      const handleMediaEnd = () => { if (isProcessing) stopProcessing(); };

      return (
        <div className="min-h-screen bg-[#050608] text-[#E4E8EC] p-4 md:p-8 selection:bg-[#4DE3E0] selection:text-[#050608]">
          <header className="mb-8 border-b border-[#1B4A4C] pb-4 flex justify-between items-end">
            <div>
              <div className="text-[#4DE3E0] text-xs uppercase tracking-widest mb-1">TARGET: MEDIA_OVERLAY</div>
              <h1 className="text-3xl font-bold uppercase text-[#E4E8EC]">FILE: SIGNAL_PROCESSOR</h1>
            </div>
            <div className="text-right text-xs text-[#1B4A4C] hidden md:block">
              <div>CLASSIFICATION: UNRESTRICTED</div>
              <div>thesentinel.network</div>
            </div>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div className="lg:col-span-4 space-y-6">
              <div className="bg-[#0A0D10] border border-[#1B4A4C] p-4 relative">
                <CornerBrackets />
                <div className="text-[#4DE3E0] text-xs mb-2 flex items-center justify-between">
                  <span>[SYSTEM_STATUS]</span>
                  <Activity size={14} className={isProcessing ? "text-[#FF6A1A] animate-pulse" : ""} />
                </div>
                <div className={`font-bold tabular-nums ${isProcessing ? 'text-[#FF6A1A]' : 'text-[#E4E8EC]'}`}>{statusText}</div>
                {isProcessing && (
                  <div className="mt-4">
                    <div className="flex justify-between text-xs mb-1"><span>PROGRESS</span><span className="tabular-nums">{progress}%</span></div>
                    <div className="h-1 bg-[#050608] border border-[#1B4A4C]"><div className="h-full bg-[#4DE3E0] transition-all duration-100" style={{ width: `${progress}%` }}></div></div>
                  </div>
                )}
              </div>

              <div className="bg-[#0A0D10] border border-[#1B4A4C] p-4 relative space-y-4">
                <div className="text-[#4DE3E0] text-xs mb-4 border-b border-[#1B4A4C] pb-2 flex items-center gap-2"><Upload size={14} /> [ASSET_INGESTION]</div>
                <div>
                  <label className="block text-xs mb-2 text-[#E4E8EC]">01 // BASE PLATE (VIDEO OR IMAGE)</label>
                  <div className="relative border border-[#1B4A4C] hover:border-[#4DE3E0] transition-colors bg-[#050608] p-3 flex items-center justify-between cursor-pointer group">
                    <span className="text-xs truncate max-w-[200px] opacity-70 group-hover:opacity-100">{mediaFile && mediaType ? `PLATE_LOADED [${mediaType.toUpperCase()}]` : "SELECT_FILE..."}</span>
                    <Upload size={14} className="text-[#4DE3E0]" />
                    <input type="file" accept="image/*,video/*" onChange={handleMediaUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                  </div>
                  <p className="text-[10px] text-[#1B4A4C] mt-1">If video, native audio will be extracted automatically.</p>
                </div>
                <div>
                  <label className="block text-xs mb-2 text-[#E4E8EC]">02 // DEDICATED AUDIO TRACK (OPTIONAL)</label>
                  <div className="relative border border-[#1B4A4C] hover:border-[#4DE3E0] transition-colors bg-[#050608] p-3 flex items-center justify-between cursor-pointer group">
                    <span className="text-xs truncate max-w-[200px] opacity-70 group-hover:opacity-100">{audioFile ? "AUDIO_LOADED.DAT" : "OVERRIDE_AUDIO..."}</span>
                    <Upload size={14} className="text-[#4DE3E0]" />
                    <input type="file" accept="audio/*" onChange={handleAudioUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                  </div>
                  <p className="text-[10px] text-[#1B4A4C] mt-1">Overrides base plate audio if provided.</p>
                </div>
                <audio ref={audioRef} src={audioFile} onEnded={handleMediaEnd} className="hidden" />
                <video ref={videoRef} src={mediaType === 'video' ? mediaFile : null} onEnded={!audioFile ? handleMediaEnd : undefined} className="hidden" playsInline />
              </div>

              <div className="bg-[#0A0D10] border border-[#1B4A4C] p-4 relative space-y-6">
                <div className="text-[#4DE3E0] text-xs mb-4 border-b border-[#1B4A4C] pb-2 flex items-center gap-2"><Sliders size={14} /> [VISUAL_TELEMETRY]</div>
                <div>
                  <label className="block text-xs mb-2 text-[#E4E8EC]">// OVERLAY_ARCHITECTURE</label>
                  <div className="grid grid-cols-1 gap-2">
                    <BrutalistButton variant="ghost" active={visualStyle === 'spectrum'} onClick={() => { setVisualStyle('spectrum'); setVerticalPosition(100); }} className="justify-start">[ALPHA] DATA-DENSE BARS</BrutalistButton>
                    <BrutalistButton variant="ghost" active={visualStyle === 'oscilloscope'} onClick={() => { setVisualStyle('oscilloscope'); setVerticalPosition(50); }} className="justify-start">[BETA] CLINICAL OSCILLOSCOPE</BrutalistButton>
                  </div>
                </div>
                <div>
                  <label className="block text-xs mb-3 text-[#E4E8EC] border-t border-[#1B4A4C] pt-4 mt-4">// OVERLAY_GEOMETRY</label>
                  <div className="space-y-3">
                    <div>
                      <div className="flex justify-between text-[10px] text-[#E4E8EC] mb-1"><span>Y-AXIS_OFFSET</span><span className="tabular-nums">{verticalPosition}%</span></div>
                      <input type="range" min="10" max="100" step="1" value={verticalPosition} onChange={(e) => setVerticalPosition(parseFloat(e.target.value))} className="w-full h-1 bg-[#1B4A4C] appearance-none cursor-pointer" />
                    </div>
                    <div>
                      <div className="flex justify-between text-[10px] text-[#E4E8EC] mb-1"><span>AMPLITUDE_SCALE</span><span className="tabular-nums">{amplitudeScale.toFixed(1)}x</span></div>
                      <input type="range" min="0.1" max="3.0" step="0.1" value={amplitudeScale} onChange={(e) => setAmplitudeScale(parseFloat(e.target.value))} className="w-full h-1 bg-[#1B4A4C] appearance-none cursor-pointer" />
                    </div>
                    <div>
                      <div className="flex justify-between text-[10px] text-[#E4E8EC] mb-1"><span>TRACE_OPACITY</span><span className="tabular-nums">{(traceOpacity * 100).toFixed(0)}%</span></div>
                      <input type="range" min="0.1" max="1.0" step="0.05" value={traceOpacity} onChange={(e) => setTraceOpacity(parseFloat(e.target.value))} className="w-full h-1 bg-[#1B4A4C] appearance-none cursor-pointer" />
                    </div>
                  </div>
                </div>
                <div>
                  <label className="block text-xs mb-2 text-[#E4E8EC] flex items-center gap-2 border-t border-[#1B4A4C] pt-4 mt-4"><Palette size={12} /> // SIGNAL_COLOR_MATRIX</label>
                  <div className="space-y-4">
                    <div>
                      <div className="text-[10px] text-[#4DE3E0] mb-1">PRIMARY WAVEFORM</div>
                      <div className="flex gap-2 items-center">
                        {SWATCHES.map(swatch => (
                          <button key={swatch.label} onClick={() => setPrimaryColor(swatch.value)} title={swatch.label} className={`w-6 h-6 border ${primaryColor === swatch.value ? 'border-white scale-110' : 'border-[#1B4A4C]'} transition-transform`} style={{ backgroundColor: swatch.value }} />
                        ))}
                        <div className="w-[1px] h-6 bg-[#1B4A4C] mx-1"></div>
                        <input type="color" value={primaryColor} onChange={(e) => setPrimaryColor(e.target.value)} className="w-6 h-6 border border-[#1B4A4C]" title="CUSTOM_HEX" />
                      </div>
                    </div>
                    <div>
                      <div className="text-[10px] text-[#FF6A1A] mb-1">PEAK / CRITICAL STATE</div>
                      <div className="flex gap-2 items-center">
                        {SWATCHES.map(swatch => (
                          <button key={swatch.label} onClick={() => setSecondaryColor(swatch.value)} title={swatch.label} className={`w-6 h-6 border ${secondaryColor === swatch.value ? 'border-white scale-110' : 'border-[#1B4A4C]'} transition-transform`} style={{ backgroundColor: swatch.value }} />
                        ))}
                        <div className="w-[1px] h-6 bg-[#1B4A4C] mx-1"></div>
                        <input type="color" value={secondaryColor} onChange={(e) => setSecondaryColor(e.target.value)} className="w-6 h-6 border border-[#1B4A4C]" title="CUSTOM_HEX" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="flex gap-4">
                {!isProcessing ? (
                  <BrutalistButton onClick={startProcessing} disabled={!mediaFile} className="w-full" variant={mediaFile ? 'teal' : 'ghost'}><Play size={16} /> INITIALIZE RENDER</BrutalistButton>
                ) : (
                  <BrutalistButton onClick={stopProcessing} className="w-full" variant="orange"><Square size={16} /> ABORT SEQUENCE</BrutalistButton>
                )}
              </div>
            </div>

            <div className="lg:col-span-8 space-y-6">
              <div className="bg-[#0A0D10] border border-[#1B4A4C] p-2 relative flex flex-col items-center justify-center min-h-[400px]">
                <CornerBrackets />
                <div className="absolute top-4 left-4 text-[#4DE3E0] text-[10px] flex gap-4 opacity-50 z-10 pointer-events-none">
                  <span>RES: 1280x720</span><span>FRQ_LOCK: ACTIVE</span><span>COLOR_MODE: HEX_OVERRIDE</span>
                </div>
                <Crosshair className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-[#1B4A4C] opacity-20 w-32 h-32 pointer-events-none" />
                <canvas ref={canvasRef} width={1280} height={720} className="w-full max-w-full h-auto border border-[#1B4A4C] bg-[#050608] aspect-video" />
              </div>
              {outputVideo && (
                <div className="bg-[#0A0D10] border border-[#FF6A1A] p-4 relative">
                  <div className="absolute top-0 left-0 w-full h-1 bg-[#FF6A1A]"></div>
                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                    <div>
                      <div className="text-[#FF6A1A] text-xs font-bold mb-1">EXPORT // SUCCESS</div>
                      <div className="text-xs text-[#E4E8EC]">File: {outputVideo.filename} // Native Upload Compatible</div>
                    </div>
                    <a href={outputVideo.url} download={outputVideo.filename} className="flex items-center gap-2 bg-[#FF6A1A] text-[#050608] px-4 py-2 text-sm font-bold uppercase hover:bg-[#E4E8EC] transition-colors whitespace-nowrap"><Download size={16} /> ACQUIRE ASSET</a>
                  </div>
                </div>
              )}
            </div>
          </div>

          <footer className="mt-12 text-right text-[#1B4A4C] text-xs border-t border-[#1B4A4C] pt-4">
            EOF // THE_SENTINEL_NETWORK // {new Date().getFullYear()}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
